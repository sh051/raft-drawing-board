<!DOCTYPE html>
<html>
<head>
    <title>Distributed Drawing Board</title>
</head>

<body style="margin:0; font-family:Arial; text-align:center;">

<h2>Distributed Drawing Board (RAFT)</h2>

<button onclick="clearCanvas()">Clear</button>

<br><br>

<canvas id="board" width="900" height="500" style="border:1px solid black"></canvas>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

const ws = new WebSocket("ws://localhost:8080");

let drawing = false;
let lastX = 0;
let lastY = 0;

ctx.lineWidth = 2;
ctx.lineCap = "round";

// ===== START DRAW =====
canvas.addEventListener("mousedown", (e) => {
    drawing = true;
    lastX = e.offsetX;
    lastY = e.offsetY;
});

canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mouseleave", () => drawing = false);

// ===== DRAW =====
canvas.addEventListener("mousemove", (e) => {
    if (!drawing) return;

    const x = e.offsetX;
    const y = e.offsetY;

    const stroke = { x, y, lastX, lastY };

    // local draw for smoothness
    drawLine(lastX, lastY, x, y);

    // send to backend
    ws.send(JSON.stringify(stroke));

    lastX = x;
    lastY = y;
});

// ===== RECEIVE FROM SERVER =====
ws.onmessage = (event) => {
    const { x, y, lastX, lastY } = JSON.parse(event.data);

    // draw only if different (avoid duplicate drawing feel)
    drawLine(lastX, lastY, x, y);
};

// ===== DRAW FUNCTION =====
function drawLine(x1, y1, x2, y2) {
    ctx.beginPath();
    ctx.moveTo(x1, y1);

    const midX = (x1 + x2) / 2;
    const midY = (y1 + y2) / 2;

    ctx.quadraticCurveTo(x1, y1, midX, midY);

    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    ctx.stroke();
}

// ===== CLEAR CANVAS =====
function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ===== CONNECTION STATUS =====
ws.onopen = () => console.log("Connected to gateway");
ws.onclose = () => console.log("Disconnected");
</script>

</body>
</html>
